<!DOCTYPE html>
<html>
<head lang="en">
    <title>Sonos Play/Pause Settings</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../libs/css/sdpi.css">
    <style>
        .sdpi-item-label { color: white; }
        .sdpi-item-value { color: white !important; }
        select.sdpi-item-value option { background-color: #2D2D2D; color: white; }
        .sdpi-item-value::placeholder { color: rgba(255, 255, 255, 0.5); }
        input.sdpi-item-value, select.sdpi-item-value { color: white !important; }

        .invalid { border-color: #f44336 !important; border-width: 1px; }
        .info-tooltip { font-size: 12px; color: #999; display: block; clear: both; }
        .validation-message {
            font-size: 12px; color: #f44336; display: none; width: 100%;
            clear: both; margin: 4px 0; padding-left: 96px;
        }
    </style>
</head>

<body>
    <div class="sdpi-wrapper">
        <!-- Speaker discovery -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Speaker</div>
            <select class="sdpi-item-value" id="speakerSelect">
                <option value="">Searching network…</option>
            </select>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label"></div>
            <button class="sdpi-item-value" id="rescanButton">Rescan network</button>
        </div>

        <!-- IP Address Input (manual fallback) -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Speaker IP</div>
            <input class="sdpi-item-value" type="text" id="speakerIp" placeholder="192.168.1.100"
                   pattern="^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
        </div>
        <div class="validation-message" id="ipValidationMessage">Please enter a valid IP address (e.g., 192.168.1.100)</div>
        <div class="sdpi-item">
            <div class="spdi-item-value info-tooltip">Pick a speaker above, or enter its IP manually. The key shows ▶ when idle and ⏸ while playing.</div>
        </div>
    </div>

    <script src="../libs/js/property-inspector.js"></script>

    <script>
        let websocket = null;
        let pluginAction = null;
        let currentSettings = {};
        let discoveredSpeakers = [];

        function validateIPAddress(ip) {
            const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            return ipRegex.test(ip);
        }

        function showValidationMessage(show) {
            const message = document.getElementById('ipValidationMessage');
            const input = document.getElementById('speakerIp');
            if (show) {
                message.style.display = 'block';
                input.classList.add('invalid');
            } else {
                message.style.display = 'none';
                input.classList.remove('invalid');
            }
        }

        window.connectElgatoStreamDeckSocket = function(inPort, inPluginUUID, inRegisterEvent, inInfo) {
            pluginAction = inPluginUUID;
            websocket = new WebSocket("ws://127.0.0.1:" + inPort);

            websocket.onopen = function() {
                websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inPluginUUID }));
                websocket.send(JSON.stringify({ event: "getSettings", context: pluginAction }));
                requestDevices(false);
            };

            websocket.onmessage = function(evt) {
                const { event, payload } = JSON.parse(evt.data);
                if (event === "didReceiveSettings") {
                    currentSettings = payload.settings;
                    updateUI(payload.settings);
                } else if (event === "sendToPropertyInspector" && payload && payload.event === "devices") {
                    discoveredSpeakers = payload.devices || [];
                    populateSpeakerSelect();
                }
            };
        }

        function requestDevices(force) {
            if (!websocket) return;
            setSelectSearching();
            websocket.send(JSON.stringify({
                event: "sendToPlugin",
                context: pluginAction,
                payload: { event: "getDevices", force: !!force }
            }));
        }

        function setSelectSearching() {
            const select = document.getElementById("speakerSelect");
            select.innerHTML = '<option value="">Searching network…</option>';
        }

        function populateSpeakerSelect() {
            const select = document.getElementById("speakerSelect");
            const currentIp = document.getElementById("speakerIp").value;
            select.innerHTML = "";

            const placeholder = document.createElement("option");
            placeholder.value = "";
            placeholder.textContent = discoveredSpeakers.length ? "Select a speaker…" : "No speakers found";
            select.appendChild(placeholder);

            for (const speaker of discoveredSpeakers) {
                const option = document.createElement("option");
                option.value = speaker.host;
                option.textContent = speaker.name ? `${speaker.name} (${speaker.host})` : speaker.host;
                select.appendChild(option);
            }

            select.value = discoveredSpeakers.some((s) => s.host === currentIp) ? currentIp : "";
        }

        function updateUI(settings) {
            const ipInput = document.getElementById("speakerIp");
            if (settings.speakerIp !== undefined) {
                ipInput.value = settings.speakerIp;
            }
            const speakerSelect = document.getElementById("speakerSelect");
            if (settings.speakerIp && discoveredSpeakers.some((s) => s.host === settings.speakerIp)) {
                speakerSelect.value = settings.speakerIp;
            }
        }

        function saveSettings() {
            if (!websocket) return;

            const speakerIp = document.getElementById("speakerIp").value;

            if (speakerIp && !validateIPAddress(speakerIp)) {
                showValidationMessage(true);
                return;
            }
            showValidationMessage(false);

            const settings = { ...currentSettings, speakerIp };
            currentSettings = settings;

            websocket.send(JSON.stringify({
                event: "setSettings",
                context: pluginAction,
                payload: settings
            }));
        }

        function validateInput(e) {
            const ip = e.target.value;
            showValidationMessage(!!ip && !validateIPAddress(ip));
        }

        const speakerIpInput = document.getElementById("speakerIp");
        speakerIpInput.addEventListener("input", (e) => {
            validateInput(e);
            const select = document.getElementById("speakerSelect");
            select.value = discoveredSpeakers.some((s) => s.host === e.target.value) ? e.target.value : "";
            saveSettings();
        });

        document.getElementById("speakerSelect").addEventListener("change", (e) => {
            if (!e.target.value) return;
            speakerIpInput.value = e.target.value;
            showValidationMessage(false);
            saveSettings();
        });

        document.getElementById("rescanButton").addEventListener("click", () => requestDevices(true));
    </script>
</body>
</html>
